<html>
<head>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.11.2/themes/smoothness/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-latest.js"></script>
    <script src="https://code.jquery.com/ui/1.11.2/jquery-ui.js"></script>
    <script src="x.js"></script>
    <style>
        div.scroll {
            height: 450px;
            overflow-y: auto;
        }
        .big {
            width: 200px;
            vertical-align: top;
        }
    </style>
    <script type='text/javascript'>
        window.onload = function() {
            $("button#far-left").click(far_left_click);
            $("button#left").click(left_click);
            $("button#right").click(right_click);
            $("button#far-right").click(far_right_click);
            $.ajax({
                url: "x.json",
                type: 'GET',
                cache: false,
                dataType: 'json'
            }).fail(function(e) {
                alert("Bad JSON file");
                console.log(e);
            }).done(function(data) {
                console.log("D");
                $.map(data.filenames, function(j) {
                    prepare_file(j);
                });
                data = data.data;
                steps = data;
                num_steps_to_process = data.length - 1;
            });
        }
    </script>
</head>
<body>
    <h1>Time Travel Debug for Python</h1>
    <div>
        <button id="far-left">&lt;&lt;&lt;</button>
        <button id="left">&lt;</button>
        <button id="right">&gt;</button>
        <button id="far-right">&gt;&gt;&gt;</button>
    </div>
    <div id="filename"></div>
    <div>
        <table>
            <tr>
                <td class="big">
                    <table>
                        <tr><td><div>
                            <div id="target" class="scroll">
                            </div>
                        </div></td></tr>
                    </table>
                </td>
                <td class="big">
                    <pre id="vars" class="scroll">
                    </pre>
                    <div id="returnvalue">
                    </div>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
